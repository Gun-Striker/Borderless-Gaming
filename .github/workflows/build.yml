name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest  # Necessary for VS 2017/MSBuild environments

    steps:
      - uses: actions/checkout@v4

      # Add NuGet to path for restoring packages
      - name: Add NuGet
        uses: NuGet/setup-nuget@v1.2.0

      # Set up MSBuild.exe
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Restore packages
      - name: Restore Packages
        run: nuget restore your-solution.sln

      # Build in Release Mode
      - name: Build in Release
        run: msbuild your-solution.sln /p:configuration=Release

      # Upload Artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReleaseBuild
          path: bin/Release/  # Adjust path based on your project structure
